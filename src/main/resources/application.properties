server.port=${PORT:8080}
spring.application.name=virtual-career-fair-backend
server.servlet.context-path=/
spring.datasource.url=${DATABASE_URL:${MYSQL_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:virtualcareerfair}?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${DATABASE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DATABASE_PASSWORD:${MYSQLPASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql